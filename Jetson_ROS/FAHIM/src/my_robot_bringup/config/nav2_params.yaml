### =====================================================
### FAHIM — Nav2 parameters
### Robot: differential drive, 0.278×0.176m chassis
### Footprint (base_link frame, 10mm padding over actual):
###   front  +0.19 m   rear   -0.11 m
###   left   +0.15 m   right  -0.15 m
### Max linear : 0.5 m/s   Max angular: 1.0 rad/s
###
### Localization is handled by RTAB-Map (map→odom TF).
### Do NOT run AMCL alongside this stack.
###
### Typical 3-terminal workflow:
###   T1: ros2 launch my_robot_bringup robot.launch.py
###   T2: ros2 launch my_robot_bringup slam.launch.py localization:=true
###   T3: ros2 launch my_robot_bringup nav2.launch.py
### =====================================================

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5      # differential drive: vy never observed
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # 5 cm radius: the slight positional drift during in-place rotation
      # (a few mm per degree) satisfies the check over 60 s.
      # Real stuck-detection is now the time allowance, not the radius.
      required_movement_radius: 0.05
      movement_time_allowance: 60.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05         # 5 cm position tolerance
      yaw_goal_tolerance: 0.4         # ~23° heading — avoids endless fine rotation

    FollowPath:
      # Regulated Pure Pursuit — chosen over DWB because it has
      # use_rotate_to_heading which explicitly rotates the robot in place
      # before following the path AND at the final goal heading.
      # DWB's RotateToGoal critic often fails near walls because the
      # inflated footprint swept area is marked as an obstacle.
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # ---- Velocity limits ----
      desired_linear_vel:  0.4        # m/s cruise speed (slightly below max for comfort)
      max_linear_accel:    1.0        # m/s²
      max_linear_decel:    1.5        # m/s²  (braking harder than accel)

      # ---- Lookahead ----
      lookahead_dist:       0.6       # m — how far ahead on the path to aim
      min_lookahead_dist:   0.3       # m — floor when slowing
      max_lookahead_dist:   0.9       # m — ceiling at full speed
      lookahead_time:       1.5       # s  — alternative: dist = speed * time
      use_velocity_scaled_lookahead_dist: false

      # ---- Rotate to heading (KEY — fixes in-place rotation) ----
      # When a new goal arrives and the required heading change is larger
      # than rotate_to_heading_min_angle, the robot rotates in place first,
      # then drives forward. The same logic applies at the final goal pose.
      use_rotate_to_heading:        true
      rotate_to_heading_min_angle:  0.785   # 45° — rotate in place if turn > 45°
      rotate_to_heading_angular_vel: 1.0    # rad/s — full speed overcomes motor stiction
      max_angular_accel:            2.0     # rad/s²

      # ---- Approach ----
      min_approach_linear_velocity:     0.05   # m/s — crawl when very close to goal
      approach_velocity_scaling_dist:   1.0    # m — start slowing at 1 m from goal

      # ---- Collision avoidance ----
      use_collision_detection:                    true
      max_allowed_time_to_collision_up_to_goal:   1.0   # s

      # ---- Curvature / path following ----
      use_regulated_linear_velocity_scaling:      true
      use_fixed_curvature_lookahead:              false
      curvature_lookahead_dist:                   0.25
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius:        0.9
      regulated_linear_scaling_min_speed:         0.25

      allow_reversing:      false
      transform_tolerance:  0.2
      use_interpolation:    true
      max_robot_pose_search_dist: 10.0

# ---- Local costmap (rolling 3×3 m window around robot) ----
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width:  3
      height: 3
      resolution: 0.05

      # Rectangular footprint with 10 mm padding over actual hardware
      # (front 0.183→0.19, rear -0.095→-0.11, ±wheel edge 0.14→0.15)
      footprint: "[[0.19, 0.15], [0.19, -0.15], [-0.11, -0.15], [-0.11, 0.15]]"

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 0.30 m: large enough to route around table/chair legs (~5 cm wide)
        # while keeping corridors navigable (room width ~2 m leaves 1.4 m clearance)
        inflation_radius: 0.30
        cost_scaling_factor: 3.0

      always_send_full_costmap: true

# ---- Global costmap (full static map) ----
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      track_unknown_space: true

      footprint: "[[0.19, 0.15], [0.19, -0.15], [-0.11, -0.15], [-0.11, 0.15]]"

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.30
        cost_scaling_factor: 3.0

      always_send_full_costmap: true

# ---- Global planner ----
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false          # Dijkstra — more reliable for first bring-up
      allow_unknown: true       # plan through unexplored cells

# ---- Path smoother ----
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ---- Recovery behaviors ----
behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    max_rotational_vel: 1.0     # match RPP rotate_to_heading_angular_vel
    min_rotational_vel: 0.5    # high enough to overcome motor stiction
    rotational_acc_lim: 2.0

# ---- Waypoint follower ----
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# ---- Velocity smoother ----
# Smooths cmd_vel output before it reaches arduino_bridge.
# cmd_vel_smoothed → (this node) → cmd_vel → arduino_bridge
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity:  [ 0.5,  0.0,  1.0]
    min_velocity:  [-0.5,  0.0, -1.0]
    max_accel:     [ 1.0,  0.0,  2.0]
    max_decel:     [-1.5,  0.0, -2.0]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ---- Map server (static map for global costmap) ----
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""           # overridden at launch time via map_path argument

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true
